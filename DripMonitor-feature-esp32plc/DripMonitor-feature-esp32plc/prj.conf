#Application
CONFIG_ENABLE_DRIPPER=y
CONFIG_ENABLE_DISPLAY=n
CONFIG_ENABLE_CLOUD=y


#Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_MODE_DEFERRED=y


#Per-Module Logging Configuration
#0=OFF, 1=ERR, 2=WRN, 3=INF, 4=DBG
CONFIG_APP_MAIN_LOG_LEVEL_INF=y
CONFIG_APP_DRIPPER_LOG_LEVEL_INF=y
CONFIG_APP_DISPLAY_LOG_LEVEL_INF=y
CONFIG_APP_CLOUD_LOG_LEVEL_INF=y
CONFIG_PID_TUNING_LOG=n


#Zephyr Module Logging
#CONFIG_NET_LOG=y
#CONFIG_SNTP_LOG_LEVEL_DBG=y
#CONFIG_ETHERNET_LOG_LEVEL_DBG=y
#CONFIG_ETH_W5500_LOG_LEVEL_DBG=y
#CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
#CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
#CONFIG_MBEDTLS_DEBUG=y
CONFIG_I2C_LOG_LEVEL_DBG=y


#C/C++ Library Config
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_GLIBCXX_LIBCPP=y


#Enable Board Features
# Most of these are also turned on in the board's defconfig; we keep them
# here so the application is buildable on any Zephyr board that exposes
# the necessary HW.
CONFIG_GPIO=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_PWM=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_UART_INTERRUPT_DRIVEN=y


#Config Stacks & Heaps
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_USAGE=y


#Enable Networking
# We talk to the FX30 cellular gateway over plain Ethernet (W5500),
# get a static address from NET_CONFIG, and run MQTT over the
# resulting IPv4 stack.  The FX30 ethernet port is always 192.168.13.31/24.
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
# Static IPv4 — FX30 acts as default gateway on 192.168.13.31/24.
CONFIG_NET_DHCPV4=n
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.13.10"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.13.31"

#Enable DNS
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_SERVER2="1.1.1.1"
CONFIG_NET_SOCKETS_DNS_TIMEOUT=10000


# Network management
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONNECTION_MANAGER=y


#Enable Sockets
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=4


#Enable random numbers for network use
CONFIG_ENTROPY_GENERATOR=y


#Enable MQTT
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=n
CONFIG_MQTT_KEEPALIVE=90


#Enable Flash Storage
CONFIG_FLASH=y
CONFIG_NVS=y


#Enable Watchdog
# The watchdog is the load-bearing piece of our fail-safe story: if the
# CPU hangs, the WDT resets it and the boot-time SYS_INIT hook
# re-initialises the PCA9685 to all-OFF before the application runs.
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n


#Clock
CONFIG_RTC=y
CONFIG_SNTP=y

#CONFIG_NET_SOCKETS_SOCKOPT_TLS=y

# TLS configuration (currently unused, broker is plain MQTT)
#CONFIG_MBEDTLS=y
#CONFIG_MBEDTLS_BUILTIN=y
#CONFIG_MBEDTLS_ENABLE_HEAP=y
#CONFIG_MBEDTLS_HEAP_SIZE=65536
#CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
#CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
#CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
#CONFIG_MBEDTLS_AES_ROM_TABLES=y
#CONFIG_MBEDTLS_TLS_VERSION_1_2=y
#CONFIG_MBEDTLS_HAVE_TIME_DATE=y


# BootLoader (disabled until we wire up MCUboot for the ESP32)
#CONFIG_BOOTLOADER_MCUBOOT=y
#CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
#CONFIG_FLASH_MAP=y

# Network buffer configuration for MQTT over Ethernet
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_BUF_DATA_SIZE=256
CONFIG_NET_PKT_RX_COUNT=20
CONFIG_NET_PKT_TX_COUNT=20

# State Machine Framework
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INITIAL_TRANSITION=y

CONFIG_MODBUS=y
CONFIG_MODBUS_SERIAL=y
CONFIG_MODBUS_BUFFER_SIZE=256